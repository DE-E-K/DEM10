global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Heartbeat pipeline Python services
  - job_name: heartbeat_producer
    static_configs:
      - targets: ["producer:8000"]
    metrics_path: /metrics

  # Apache Flink cluster metrics (replaces consumer + anomaly-detector)
  - job_name: flink
    static_configs:
      - targets:
          - "flink-jobmanager:9249"
          - "flink-taskmanager:9249"
    metrics_path: /
